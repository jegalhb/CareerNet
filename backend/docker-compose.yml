services:
  mysql:
    image: mysql:8.4
    container_name: careernet-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: careernet
      MYSQL_ROOT_PASSWORD: careernet
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - careernet_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pcareernet"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  careernet_mysql_data:
