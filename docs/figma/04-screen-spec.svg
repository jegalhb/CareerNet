<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <rect width="1800" height="1100" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">화면설계서</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="16" fill="#64748b">주요 화면별 UI 구성, 라우트, 연결 API를 정리한 Figma용 화면설계서입니다.</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="160" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="90" y="205" font-size="22" font-weight="700" fill="#1a365d">Main.jsx</text>
    <text x="90" y="238" font-size="14" fill="#64748b">Route: `/`</text>
    <text x="90" y="280" font-size="15" fill="#334155">- Hero 검색</text>
    <text x="90" y="312" font-size="15" fill="#334155">- 추천/인기/새소식 탭</text>
    <text x="90" y="344" font-size="15" fill="#334155">- JobSlider, DeptSlider</text>
    <text x="90" y="376" font-size="15" fill="#334155">- 로그인 상태별 RoadmapCard</text>

    <rect x="640" y="160" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="670" y="205" font-size="22" font-weight="700" fill="#1a365d">CareerDesign.jsx</text>
    <text x="670" y="238" font-size="14" fill="#64748b">Route: `/design`</text>
    <text x="670" y="280" font-size="15" fill="#334155">- Holland 검사 진행</text>
    <text x="670" y="312" font-size="15" fill="#334155">- 답변 제출</text>
    <text x="670" y="344" font-size="15" fill="#334155">- API: POST /api/assessments/holland</text>

    <rect x="1220" y="160" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="1250" y="205" font-size="22" font-weight="700" fill="#1a365d">JobInfo / JobDetail</text>
    <text x="1250" y="238" font-size="14" fill="#64748b">Route: `/jobs`, `/jobs/:jobId`</text>
    <text x="1250" y="280" font-size="15" fill="#334155">- 직업 목록/검색</text>
    <text x="1250" y="312" font-size="15" fill="#334155">- 직업 상세, 로드맵, 멘토</text>
    <text x="1250" y="344" font-size="15" fill="#334155">- 관심 직업 저장</text>
    <text x="1250" y="376" font-size="15" fill="#334155">- API: /api/jobs, /api/bookmarks</text>

    <rect x="60" y="470" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="90" y="515" font-size="22" font-weight="700" fill="#1a365d">Mentoring.jsx</text>
    <text x="90" y="548" font-size="14" fill="#64748b">Route: `/mentoring`</text>
    <text x="90" y="590" font-size="15" fill="#334155">- 멘토 목록/상세</text>
    <text x="90" y="622" font-size="15" fill="#334155">- 신청 메시지 입력</text>
    <text x="90" y="654" font-size="15" fill="#334155">- API: /api/mentors, /api/mentoring-requests</text>

    <rect x="640" y="470" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="670" y="515" font-size="22" font-weight="700" fill="#1a365d">MyPage.jsx</text>
    <text x="670" y="548" font-size="14" fill="#64748b">Route: `/mypage/*`</text>
    <text x="670" y="590" font-size="15" fill="#334155">- 프로필</text>
    <text x="670" y="622" font-size="15" fill="#334155">- 내 진로 로드맵</text>
    <text x="670" y="654" font-size="15" fill="#334155">- 검사 결과, 관심 직업, 멘토링 내역</text>

    <rect x="1220" y="470" width="520" height="250" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="1250" y="515" font-size="22" font-weight="700" fill="#1a365d">Recruit / Community</text>
    <text x="1250" y="548" font-size="14" fill="#64748b">Route: `/recruit`, `/community`</text>
    <text x="1250" y="590" font-size="15" fill="#334155">- 채용공고 목록/상세</text>
    <text x="1250" y="622" font-size="15" fill="#334155">- 커뮤니티 목록/상세</text>
    <text x="1250" y="654" font-size="15" fill="#334155">- API: /api/recruitments, /api/community/posts</text>

    <rect x="60" y="805" width="1680" height="190" rx="16" fill="#1a365d"/>
    <text x="100" y="855" font-size="24" font-weight="700" fill="#ffffff">화면 공통 규칙</text>
    <text x="100" y="900" font-size="16" fill="#dbeafe">1. GNB는 주요 화면에서 공통 노출한다.</text>
    <text x="100" y="935" font-size="16" fill="#dbeafe">2. 데이터 화면은 백엔드 REST API 응답을 기준으로 렌더링한다.</text>
    <text x="100" y="970" font-size="16" fill="#dbeafe">3. 로그인 여부에 따라 마이페이지, 관심 직업, 로드맵 표시를 분기한다.</text>
  </g>
</svg>
