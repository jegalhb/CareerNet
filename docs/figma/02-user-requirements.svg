<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">사용자 요구사항 정의</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="16" fill="#64748b">진로 탐색 사용자가 서비스를 이용하며 기대하는 핵심 요구사항입니다.</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="170" width="330" height="210" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="88" y="214" font-size="20" font-weight="700" fill="#1a365d">비회원 사용자</text>
    <text x="88" y="254" font-size="15" fill="#334155">- 서비스 소개 확인</text>
    <text x="88" y="286" font-size="15" fill="#334155">- 직업/채용/커뮤니티 탐색</text>
    <text x="88" y="318" font-size="15" fill="#334155">- 진로 검사 시작 유도</text>
    <text x="88" y="350" font-size="15" fill="#334155">- 회원가입/로그인 진입</text>

    <rect x="445" y="170" width="330" height="210" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="473" y="214" font-size="20" font-weight="700" fill="#1a365d">로그인 사용자</text>
    <text x="473" y="254" font-size="15" fill="#334155">- 검사 결과 저장</text>
    <text x="473" y="286" font-size="15" fill="#334155">- 관심 직업 저장/해제</text>
    <text x="473" y="318" font-size="15" fill="#334155">- 멘토링 신청</text>
    <text x="473" y="350" font-size="15" fill="#334155">- 마이페이지 관리</text>

    <rect x="830" y="170" width="330" height="210" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="858" y="214" font-size="20" font-weight="700" fill="#1a365d">진로 탐색 사용자</text>
    <text x="858" y="254" font-size="15" fill="#334155">- Holland 유형 확인</text>
    <text x="858" y="286" font-size="15" fill="#334155">- 추천 직업 비교</text>
    <text x="858" y="318" font-size="15" fill="#334155">- 준비 역량 확인</text>
    <text x="858" y="350" font-size="15" fill="#334155">- 진로 로드맵 확인</text>

    <rect x="1215" y="170" width="330" height="210" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="1243" y="214" font-size="20" font-weight="700" fill="#1a365d">멘토링 희망자</text>
    <text x="1243" y="254" font-size="15" fill="#334155">- 직업별 멘토 조회</text>
    <text x="1243" y="286" font-size="15" fill="#334155">- 멘토 상세 확인</text>
    <text x="1243" y="318" font-size="15" fill="#334155">- 신청 메시지 작성</text>
    <text x="1243" y="350" font-size="15" fill="#334155">- 신청 내역 확인</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="470" width="1485" height="360" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="90" y="520" font-size="22" font-weight="700" fill="#111827">기능 요구사항</text>
    <line x1="90" y1="548" x2="1515" y2="548" stroke="#e2e8f0"/>
    <text x="90" y="595" font-size="16" fill="#334155">FR-01 회원가입/로그인</text>
    <text x="450" y="595" font-size="16" fill="#334155">FR-02 진로 검사 제출</text>
    <text x="810" y="595" font-size="16" fill="#334155">FR-03 검사 결과 저장</text>
    <text x="1170" y="595" font-size="16" fill="#334155">FR-04 직업 추천</text>
    <text x="90" y="650" font-size="16" fill="#334155">FR-05 직업 상세 탐색</text>
    <text x="450" y="650" font-size="16" fill="#334155">FR-06 멘토 조회</text>
    <text x="810" y="650" font-size="16" fill="#334155">FR-07 멘토링 신청</text>
    <text x="1170" y="650" font-size="16" fill="#334155">FR-08 관심 직업 저장</text>
    <text x="90" y="705" font-size="16" fill="#334155">FR-09 마이페이지</text>
    <text x="450" y="705" font-size="16" fill="#334155">FR-10 채용공고</text>
    <text x="810" y="705" font-size="16" fill="#334155">FR-11 커뮤니티</text>
    <text x="1170" y="705" font-size="16" fill="#334155">FR-12 로그인 상태별 UI</text>
  </g>

  <text x="60" y="920" font-family="Arial, sans-serif" font-size="15" fill="#64748b">비기능 요구사항: REST API, MVC 3계층, JPA, Flyway, MySQL seed 데이터, BCrypt 비밀번호 보호, 제출용 문서화</text>
</svg>
